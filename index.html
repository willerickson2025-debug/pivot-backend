<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PIVOT</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #000000;
  --white: #FFFFFF;
  --green: #00FF41;
  --grey: #111111;
  --grey2: #1A1A1A;
  --border: #222222;
}
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
nav.scrolled {
  background: rgba(0,0,0,0.95);
  border-bottom: 1px solid var(--border);
}
.nav-tabs { display: flex; align-items: stretch; height: 64px; }
.nav-tab {
  display: flex;
  align-items: center;
  padding: 0 36px;
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  border: none;
  background: none;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  position: relative;
}
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--white); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── HOME ── */
.home-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.45;
  filter: grayscale(100%) contrast(1.1);
}
.home-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
  z-index: 1;
}
.home-center {
  position: relative;
  z-index: 2;
  text-align: center;
}
.home-pivot-text {
  font-size: clamp(80px, 18vw, 220px);
  letter-spacing: 24px;
  color: var(--white);
  font-weight: 700;
  line-height: 1;
  text-indent: 24px;
}

/* ── MODAL ── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--black);
  border: 2px solid var(--white);
  width: 100%;
  max-width: 1100px;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
}
.modal-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 28px 32px;
  border-bottom: 2px solid var(--white);
  position: sticky;
  top: 0;
  background: var(--black);
  z-index: 10;
}
.modal-team {
  display: flex;
  flex-direction: column;
}
.modal-team.home { text-align: right; }
.modal-team-city { font-size: 9px; letter-spacing: 3px; color: #555; margin-bottom: 4px; }
.modal-team-name { font-size: 28px; letter-spacing: 2px; line-height: 1; }
.modal-team-abbr { font-size: 9px; letter-spacing: 3px; color: #444; margin-top: 4px; }
.modal-score-center { text-align: center; }
.modal-score-big { font-size: 48px; letter-spacing: 3px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,.3); line-height: 1; }
.modal-score-vs { font-size: 11px; letter-spacing: 4px; color: #333; }
.modal-status { font-size: 9px; letter-spacing: 3px; color: var(--green); margin-top: 6px; }
.modal-close {
  position: absolute;
  top: 20px; right: 24px;
  background: none;
  border: 1px solid var(--border);
  color: var(--white);
  font-size: 16px;
  width: 32px; height: 32px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
}
.modal-close:hover { background: var(--white); color: var(--black); }
.modal-body { padding: 0; }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); }
.modal-tab {
  padding: 14px 28px;
  font-size: 10px;
  letter-spacing: 3px;
  color: #555;
  cursor: pointer;
  border: none;
  background: none;
  border-right: 1px solid var(--border);
  border-bottom: 2px solid transparent;
  transition: all 0.1s;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
}
.modal-tab:hover { color: var(--white); }
.modal-tab.active { color: var(--green); border-bottom-color: var(--green); }
.box-score { padding: 24px 32px; }
.box-team-label { font-size: 9px; letter-spacing: 4px; color: var(--green); margin-bottom: 12px; margin-top: 24px; }
.box-table { width: 100%; border-collapse: collapse; }
.box-table th {
  font-size: 8px; letter-spacing: 3px; color: #444;
  padding: 8px 10px; text-align: right;
  border-bottom: 1px solid var(--border);
}
.box-table th:first-child { text-align: left; }
.box-table td {
  font-size: 11px; letter-spacing: 1px; color: var(--white);
  padding: 10px 10px; text-align: right;
  border-bottom: 1px solid #141414;
  font-weight: 400;
}
.box-table td:first-child { text-align: left; font-weight: 700; font-size: 12px; }
.box-table tr:hover td { background: var(--grey); }
.box-pts { color: var(--green) !important; font-weight: 700 !important; font-size: 13px !important; }
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 8px; letter-spacing: 3px; color: var(--green);
  border: 1px solid var(--green); padding: 3px 8px;
  animation: blink 1s infinite;
}

/* ── TICKER ── */
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: var(--black);
  border-top: 2px solid var(--green);
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 1000;
}
.ticker-label {
  flex-shrink: 0;
  background: var(--green);
  color: var(--black);
  font-size: 9px;
  letter-spacing: 3px;
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
  font-weight: 700;
  white-space: nowrap;
  z-index: 2;
}
.ticker-track-wrap {
  flex: 1;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
}
.ticker-track {
  display: flex;
  align-items: center;
  white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
  will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--green);
  padding: 0 32px;
  text-shadow: 0 0 8px rgba(0,255,65,0.4);
  white-space: nowrap;
}
.ticker-sep {
  color: #1a1a1a;
  font-size: 14px;
  padding: 0 8px;
}

.toolbar {
  height: 60px;
  border-bottom: 2px solid var(--white);
  display: flex;
  align-items: stretch;
  background: var(--black);
}
.tb-btn {
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--green);
  font-size: 12px;
  letter-spacing: 3px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 0 28px;
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--green); color: var(--black); }
.tb-btn:disabled { color: #333; cursor: not-allowed; }
.tb-input {
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 0 20px;
  outline: none;
  width: 220px;
}
.tb-input::placeholder { color: #333; }
.tb-info {
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 11px;
  letter-spacing: 3px;
  color: #333;
  margin-left: auto;
  border-left: 1px solid var(--border);
}

/* ── GAMES GRID ── */
.g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
.g-card {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.g-card:hover { background: var(--grey); }
.g-card.sel { background: var(--grey2); }
.g-card.sel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
.g-time { font-size: 11px; letter-spacing: 3px; color: var(--green); margin-bottom: 24px; }
.g-matchup { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 20px; }
.g-team-a { text-align: left; }
.g-team-h { text-align: right; }
.g-city { font-size: 9px; letter-spacing: 3px; color: #444; margin-bottom: 4px; }
.g-name { font-size: 28px; letter-spacing: 1px; line-height: 1; }
.g-abbr { font-size: 9px; letter-spacing: 3px; color: #555; margin-top: 4px; }
.g-score { font-size: 34px; letter-spacing: 2px; color: var(--green); text-shadow: 0 0 10px rgba(0,255,65,.4); text-align: center; line-height:1; }
.g-vs { font-size: 12px; letter-spacing: 4px; color: #333; text-align: center; }
.g-badge { display: inline-block; font-size: 9px; letter-spacing: 3px; padding: 4px 10px; border: 1px solid #333; color: #555; }
.g-badge.live { border-color: var(--green); color: var(--green); animation: blink 1s infinite; }

/* ── ANALYSIS ── */
.a-layout { display: grid; grid-template-columns: 1fr 440px; min-height: calc(100vh - 52px - 52px); }
.a-left { border-right: 2px solid var(--white); display: flex; flex-direction: column; }
.a-output { flex: 1; padding: 40px; overflow-y: auto; }
.a-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 12px; }
.a-empty-icon { font-size: 40px; color: #1a1a1a; }
.a-empty-label { font-size: 9px; letter-spacing: 4px; color: #333; }
.a-text { font-size: 15px; line-height: 2.1; letter-spacing: .5px; color: var(--white); white-space: pre-wrap; font-weight: 400; text-transform: none; }
.a-footer { display: flex; border-top: 2px solid var(--white); }
.a-meta { padding: 18px 28px; border-right: 1px solid var(--border); }
.a-mk { font-size: 9px; letter-spacing: 4px; color: #444; margin-bottom: 5px; }
.a-mv { font-size: 15px; letter-spacing: 2px; color: var(--green); }
.a-right { background: var(--grey); display: flex; flex-direction: column; }
.a-right-head { padding: 20px 28px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 4px; color: #444; }
.a-controls { padding: 28px; display: flex; flex-direction: column; gap: 14px; border-bottom: 1px solid var(--border); }
.a-label { font-size: 9px; letter-spacing: 4px; color: #444; margin-bottom: 7px; }
.a-date-input {
  background: var(--black);
  border: 1px solid var(--border);
  color: var(--white);
  font-size: 12px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 12px 16px; outline: none; width: 100%;
  transition: border-color 0.1s;
}
.a-date-input:focus { border-color: var(--green); }
.a-run {
  background: var(--green);
  border: none;
  color: var(--black);
  font-size: 12px; letter-spacing: 4px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 16px; cursor: pointer; width: 100%;
  transition: all 0.1s; margin-top: 4px;
}
.a-run:hover { background: var(--white); }
.a-run:disabled { background: #222; color: #444; cursor: not-allowed; }
.a-hint { padding: 28px; font-size: 11px; letter-spacing: 1.5px; color: #333; line-height: 2.2; font-weight: 400; text-transform: none; }

/* ── PLAYERS ── */
.p-layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 52px - 52px); }
.p-sidebar { border-right: 2px solid var(--white); display: flex; flex-direction: column; }
.p-search { display: flex; border-bottom: 2px solid var(--white); }
.p-field {
  flex: 1;
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 11px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 14px 16px; outline: none;
}
.p-field::placeholder { color: #333; }
.p-go {
  background: var(--black);
  border: none;
  color: var(--green);
  font-size: 18px; padding: 0 20px; cursor: pointer;
  transition: all 0.1s;
}
.p-go:hover { background: var(--green); color: var(--black); }
.p-quick-label { font-size: 7px; letter-spacing: 4px; color: #444; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--grey); }
.p-quick {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; letter-spacing: 3px; color: #555;
  cursor: pointer; transition: all 0.1s;
}
.p-quick:hover { color: var(--white); background: var(--grey); }
.p-detail { padding: 40px; overflow-y: auto; }
.p-name { font-size: clamp(28px, 4vw, 64px); letter-spacing: 3px; line-height: 1; margin-bottom: 10px; }
.p-meta { font-size: 9px; letter-spacing: 4px; color: var(--green); margin-bottom: 32px; }
.p-stats { display: grid; grid-template-columns: repeat(3, 1fr); border: 2px solid var(--white); margin-bottom: 32px; }
.p-stat { padding: 24px; border-right: 1px solid var(--border); text-align: center; }
.p-stat:last-child { border-right: none; }
.p-stat-v { font-size: 48px; letter-spacing: -2px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,.3); line-height: 1; }
.p-stat-k { font-size: 7px; letter-spacing: 4px; color: #444; margin-top: 4px; }
.p-analysis { font-size: 13px; line-height: 2; letter-spacing: .5px; color: var(--white); white-space: pre-wrap; font-weight: 400; text-transform: none; }
.p-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 12px; }
.p-empty-icon { font-size: 40px; color: #1a1a1a; }
.p-empty-label { font-size: 9px; letter-spacing: 4px; color: #333; }

/* ── SHARED ── */
.loader { display: flex; align-items: center; gap: 14px; padding: 40px 48px; font-size: 11px; letter-spacing: 4px; color: #333; }
.loader-bar { width: 48px; height: 2px; background: #1a1a1a; position: relative; overflow: hidden; }
.loader-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--green); animation: sweep 1s infinite; }
@keyframes sweep { to { left: 100%; } }
.err { background: rgba(255,50,50,.06); border-left: 3px solid #f33; padding: 14px 28px; font-size: 11px; letter-spacing: 2px; color: #f33; margin: 0; }
.empty { padding: 48px; font-size: 11px; letter-spacing: 4px; color: #333; text-align: center; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: #2a2a2a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'http://localhost:8000/api/v1';

function Loader({ label = 'LOADING' }) {
  return <div className="loader"><div className="loader-bar"/>{label}</div>;
}

function parseStatus(s) {
  if (!s) return { label: 'SCHEDULED', type: 'sched' };
  const l = s.toLowerCase();
  if (l.includes('final') || l === 'complete') return { label: 'FINAL', type: 'final' };
  if (l.includes('qtr') || l.includes('half') || l === 'in progress') return { label: 'LIVE', type: 'live' };
  try {
    const d = new Date(s);
    if (!isNaN(d)) return {
      label: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }),
      type: 'sched'
    };
  } catch(e) {}
  return { label: s.substring(0, 18), type: 'sched' };
}

// TICKER
function Ticker() {
  const [items, setItems] = React.useState([]);

  React.useEffect(() => {
    const today = new Date().toISOString().split('T')[0];
    fetch(`${API}/nba/games?date=${today}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data?.games?.length) return;
        const gameItems = data.games.map(g => {
          const time = (() => {
            try {
              const d = new Date(g.status);
              return isNaN(d) ? g.status : d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
            } catch { return g.status; }
          })();
          const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
          return hasScore
            ? `${g.visitor_team.abbreviation} ${g.visitor_team_score} — ${g.home_team_score} ${g.home_team.abbreviation}`
            : `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}  ${time}`;
        });
        setItems(gameItems);
      })
      .catch(() => {});
  }, []);

  const fallback = [
    'PIVOT — NBA INTELLIGENCE PLATFORM',
    'TODAY\'S SLATE NOW LOADING',
    'GAMES · ANALYSIS · PLAYERS',
    'POWERED BY PIVOT',
  ];

  const display = items.length ? items : fallback;
  const doubled = [...display, ...display];

  return (
    <div className="ticker">
      <div className="ticker-label">NBA LIVE</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item, i) => (
            <React.Fragment key={i}>
              <span className="ticker-item">{item}</span>
              <span className="ticker-sep">◆</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

// HOME
function Home({ setTab }) {
  return (
    <div className="home-wrap">
      <video
        className="home-video"
        src="bg.mp4"
        autoPlay
        loop
        muted
        playsInline
      />
      <div className="home-overlay"/>
      <div className="home-center">
        <div className="home-pivot-text">PIVOT</div>
      </div>
    </div>
  );
}

// GAME MODAL
function GameModal({ game, onClose }) {
  const [boxScore, setBoxScore] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [activeTab, setActiveTab] = React.useState('boxscore');
  const { label, type } = parseStatus(game.status);
  const hasScore = game.home_team_score > 0 || game.visitor_team_score > 0;

  React.useEffect(() => {
    const load = async () => {
      setLoading(true);
      try {
        const r = await fetch(`${API}/nba/games/${game.id}/boxscore`);
        if (r.ok) setBoxScore(await r.json());
      } catch(e) {}
      finally { setLoading(false); }
    };
    load();
    // Auto-refresh every 30s if live
    if (type === 'live') {
      const interval = setInterval(load, 30000);
      return () => clearInterval(interval);
    }
  }, [game.id]);

  React.useEffect(() => {
    const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, []);

  const StatTable = ({ players, teamName }) => (
    <div>
      <div className="box-team-label">{teamName}</div>
      <table className="box-table">
        <thead>
          <tr>
            <th style={{textAlign:'left', minWidth:160}}>Player</th>
            <th>MIN</th>
            <th>PTS</th>
            <th>REB</th>
            <th>AST</th>
            <th>STL</th>
            <th>BLK</th>
            <th>FG</th>
            <th>3P</th>
            <th>FT</th>
            <th>TO</th>
          </tr>
        </thead>
        <tbody>
          {players.map((p, i) => (
            <tr key={i}>
              <td>{p.player} <span style={{fontSize:9, color:'#444', marginLeft:6}}>{p.pos}</span></td>
              <td>{p.min}</td>
              <td className="box-pts">{p.pts}</td>
              <td>{p.reb}</td>
              <td>{p.ast}</td>
              <td>{p.stl}</td>
              <td>{p.blk}</td>
              <td style={{fontSize:10}}>{p.fg}</td>
              <td style={{fontSize:10}}>{p.fg3}</td>
              <td style={{fontSize:10}}>{p.ft}</td>
              <td>{p.to}</td>
            </tr>
          ))}
        </tbody>

  return (

                {k:'Conference Matchup', v:`${game.home_team.conference} vs ${game.visitor_team.conference}`},

// GAMES
function Games() {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const today = new Date().toISOString().split('T')[0];

  const fetch_ = async (d) => {
    setLoading(true); setError(null);
    try {
      const ts = Date.now();
      const r = await fetch(`${API}/nba/games?date=${d || today}&_=${ts}`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setGames(data.games || []);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  React.useEffect(() => {
    fetch_();
    const interval = setInterval(() => fetch_(today), 30000);
    return () => clearInterval(interval);
  }, []);

  const hasLive = games.some(g => {
    const l = g.status?.toLowerCase() || '';
    return l.includes('qtr') || l.includes('half') || l === 'in progress';
  });

  return (
    <div>
      <div className="toolbar">
        <button className="tb-btn" onClick={() => fetch_(today)}>Today</button>
        <button className="tb-btn" onClick={() => fetch_(getYesterday())}>Yesterday</button>
        <button className="tb-btn" onClick={() => fetch_(getTomorrow())}>Tomorrow</button>
        {games.length > 0 && <div className="tb-info">{games.length} Games{hasLive ? ' · LIVE' : ''}</div>}
        {hasLive && <div className="tb-info" style={{color:'var(--green)', animation:'blink 1.5s infinite'}}>AUTO-REFRESH ON</div>}
      </div>
      {error && <div className="err">{error}</div>}
      {loading && games.length === 0 && <Loader label="Fetching Games"/>}
      {!loading && games.length === 0 && !error && <div className="empty">No Games Found</div>}
      <div className="g-grid">
        {games.map(g => {
          const { label, type } = parseStatus(g.status);
          const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
          return (
            <div key={g.id} className={`g-card`} onClick={() => setSelectedGame(g)}
              style={{cursor:'pointer'}}>
              <div className="g-time">
                {type === 'live'
                  ? <span className="live-badge">● LIVE</span>
                  : label
                }
              </div>
              <div className="g-matchup">
                <div className="g-team-a">
                  <div className="g-city">{g.visitor_team.city}</div>
                  <div className="g-name">{g.visitor_team.name.split(' ').pop()}</div>
                  <div className="g-abbr">{g.visitor_team.abbreviation}</div>
                </div>
                <div>
                  {hasScore
                    ? <div className="g-score">{g.visitor_team_score}—{g.home_team_score}</div>
                    : <div className="g-vs">VS</div>
                  }
                </div>
                <div className="g-team-h">
                  <div className="g-city">{g.home_team.city}</div>
                  <div className="g-name">{g.home_team.name.split(' ').pop()}</div>
                  <div className="g-abbr">{g.home_team.abbreviation}</div>
                </div>
              </div>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                <span className={`g-badge ${type}`}>{label}</span>
                <span style={{fontSize:9, letterSpacing:2, color:'#333'}}>CLICK FOR BOX SCORE →</span>
              </div>
            </div>
          );
        })}
      </div>

      {selectedGame && (
        <GameModal game={selectedGame} onClose={() => setSelectedGame(null)} />
      )}
    </div>
  );
}

// ── FRONT OFFICE ─────────────────────────────────────────────────────────────
function FrontOffice() {
  const [subTab, setSubTab] = React.useState('trade');
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);

  // Trade state
  const [teamA, setTeamA] = React.useState('');
  const [teamB, setTeamB] = React.useState('');
  const [teamAGives, setTeamAGives] = React.useState(['']);
  const [teamBGives, setTeamBGives] = React.useState(['']);
  const [tradeContext, setTradeContext] = React.useState('');

  // Roster state
  const [rosterTeam, setRosterTeam] = React.useState('');

  const addItem = (setter, arr) => setter([...arr, '']);
  const updateItem = (setter, arr, i, val) => { const n=[...arr]; n[i]=val; setter(n); };
  const removeItem = (setter, arr, i) => setter(arr.filter((_,j)=>j!==i));

  const runTrade = async () => {
    if (!teamA || !teamB) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${API}/frontoffice/trade`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          team_a: teamA, team_b: teamB,
          team_a_gives: teamAGives.filter(Boolean),
          team_b_gives: teamBGives.filter(Boolean),
          context: tradeContext
        })
      });
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const runRoster = async () => {
    if (!rosterTeam) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${API}/frontoffice/roster?team_name=${encodeURIComponent(rosterTeam)}`);
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const inputStyle = {
    background:'var(--black)', border:'1px solid var(--border)',
    color:'var(--white)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif',
    fontWeight:700, fontSize:12, letterSpacing:2, textTransform:'uppercase',
    padding:'10px 14px', outline:'none', width:'100%', transition:'border-color 0.1s'
  };
  const labelStyle = { fontSize:8, letterSpacing:4, color:'#444', marginBottom:6, display:'block' };
  const addBtn = {
    background:'none', border:'1px solid var(--border)', color:'#555',
    fontSize:9, letterSpacing:3, padding:'6px 14px', cursor:'pointer',
    fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
    textTransform:'uppercase', marginTop:6, transition:'all 0.1s'
  };

  return (
    <div>
      <div className="toolbar">
        {[['trade','Trade Finder'],['roster','Roster & Cap']].map(([id,label]) => (
          <button key={id} className={`tb-btn ${subTab===id?'':''}` } style={subTab===id?{background:'var(--white)',color:'var(--black)'}:{}}
            onClick={() => { setSubTab(id); setResult(null); setError(null); }}>
            {label}
          </button>
        ))}
        
      </div>

      <div style={{display:'grid', gridTemplateColumns: result ? '1fr 520px' : '600px 1fr', minHeight:'calc(100vh - 124px)'}}>

          {subTab === 'trade' && (
            <div>
              <div style={{fontSize:'clamp(28px,3vw,48px)', letterSpacing:6, marginBottom:32}}>Trade Finder</div>

                    <label style={labelStyle}>Team A Sends</label>

                      <div key={i} style={{display:'flex', gap:6, marginBottom:6}}>
                        <input style={{...inputStyle, flex:1}} placeholder="Player or Pick..."

                        {teamAGives.length > 1 &&

                      </div>
                    ))}

                  </div>
                </div>

                {/* Team B */}
                <div>
                  <label style={labelStyle}>Team B</label>
                  <input style={inputStyle} placeholder="Celtics..." value={teamB} onChange={e=>setTeamB(e.target.value)}/>
                  <div style={{marginTop:20}}>
                    <label style={labelStyle}>Team B Sends</label>
                    {teamBGives.map((item,i) => (
                      <div key={i} style={{display:'flex', gap:6, marginBottom:6}}>

                <button onClick={runRoster} disabled={loading || !rosterTeam}
                  style={{background:loading?'#222':'var(--green)', border:'none', color:loading?'#444':'var(--black)',
                    fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
                    fontSize:11, letterSpacing:3, textTransform:'uppercase', padding:'0 28px', cursor:'pointer'}}>
                  {loading ? '...' : 'Analyze →'}
                </button>
              </div>
              <div style={{fontSize:10, letterSpacing:3, color:'#333', lineHeight:2}}>
                Get a full front office breakdown: roster evaluation, cap situation, trade targets, and recommended moves.
              </div>

          )}
        </div>

        {/* RIGHT — RESULTS */}
        <div style={{padding:'40px 48px', overflowY:'auto', background:'var(--grey)'}}>
          {!result && !loading && !error && (
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'50vh', gap:16}}>

              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}


// ── COACH MODE ────────────────────────────────────────────────────────────────

  const [situation, setSituation] = React.useState('');
  const [quarter, setQuarter] = React.useState('4');
  const [timeRemaining, setTimeRemaining] = React.useState('');
  const [scoreDiff, setScoreDiff] = React.useState('0');
  const [mode, setMode] = React.useState('adjust'); // adjust | timeout
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [history, setHistory] = React.useState([]);
  const [boxScore, setBoxScore] = React.useState(null);

      .catch(()=>{});
  }, []);

  React.useEffect(() => {
    if (!selectedGame) return;
    fetch(`${API}/nba/games/${selectedGame.id}/boxscore`)
      .then(r=>r.ok?r.json():null)
      .then(d=>setBoxScore(d))
      .catch(()=>{});
    const { label } = parseStatus(selectedGame.status);
    const home = selectedGame.home_team;
    const away = selectedGame.visitor_team;
    const diff = selectedGame.home_team_score - selectedGame.visitor_team_score;
    setScoreDiff(String(diff));
  }, [selectedGame]);

  const run = async () => {
    setLoading(true); setError(null);
    try {
      const endpoint = mode === 'adjust' ? '/coach/adjust' : '/coach/timeout';
      const body = mode === 'adjust'
        ? { game_id: selectedGame?.id, situation, my_team: myTeam }
        : { game_id: selectedGame?.id, my_team: myTeam, score_diff: parseInt(scoreDiff)||0, time_remaining: timeRemaining, quarter: parseInt(quarter)||4, situation };
      const r = await fetch(`${API}${endpoint}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setResult(data);
      setHistory(prev => [{...data, mode, timestamp: new Date().toLocaleTimeString(), situation}, ...prev.slice(0,9)]);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const inputStyle = {
    background:'#0a0a0a', border:'1px solid var(--border)',
    color:'var(--white)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif',
    fontWeight:700, fontSize:12, letterSpacing:2, textTransform:'uppercase',
    padding:'10px 14px', outline:'none', width:'100%', transition:'border-color 0.1s'
  };
  const labelStyle = { fontSize:8, letterSpacing:4, color:'#444', marginBottom:6, display:'block' };

  return (
    <div style={{display:'grid', gridTemplateColumns:'340px 1fr 320px', minHeight:'calc(100vh - 64px)'}}>

      {/* LEFT — GAME SELECT + CONTROLS */}
      <div style={{borderRight:'2px solid var(--white)', display:'flex', flexDirection:'column', overflowY:'auto'}}>
        <div style={{padding:'20px', borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:12}}>Select Game</div>
          {games.length === 0 && <div style={{fontSize:9, letterSpacing:3, color:'#333'}}>No games today</div>}
          {games.map(g => {
            const { label, type } = parseStatus(g.status);
            const sel = selectedGame?.id === g.id;
            return (
              <div key={g.id}
                onClick={() => { setSelectedGame(g); setMyTeam(''); }}
                style={{
                  padding:'12px 14px', marginBottom:4, cursor:'pointer',
                  border: sel ? '1px solid var(--green)' : '1px solid var(--border)',
                  background: sel ? 'rgba(0,255,65,0.05)' : 'var(--black)',
                  transition:'all 0.1s'
                }}>
                <div style={{fontSize:8, letterSpacing:3, color: type==='live' ? 'var(--green)' : '#555', marginBottom:4}}>
                  {type==='live' ? '● LIVE' : label}
                </div>
                <div style={{fontSize:13, letterSpacing:1}}>
                  {g.visitor_team.abbreviation} @ {g.home_team.abbreviation}
                </div>
                {(g.home_team_score > 0 || g.visitor_team_score > 0) && (
                  <div style={{fontSize:11, color:'var(--green)', letterSpacing:2, marginTop:2}}>
                    {g.visitor_team_score} — {g.home_team_score}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {selectedGame && (
          <div style={{padding:'20px', flex:1}}>
            <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:12}}>My Team</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:20}}>
              {[selectedGame.visitor_team, selectedGame.home_team].map(t => (
                <button key={t.id}
                  onClick={() => setMyTeam(t.name)}
                  style={{
                    background: myTeam===t.name ? 'var(--green)' : 'var(--black)',
                    color: myTeam===t.name ? 'var(--black)' : '#555',
                    border:`1px solid ${myTeam===t.name ? 'var(--green)' : 'var(--border)'}`,
                    padding:'10px 8px', cursor:'pointer', fontSize:10, letterSpacing:2,
                    fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
                    textTransform:'uppercase', transition:'all 0.1s'
                  }}>
                  {t.abbreviation}
                </button>
              ))}
            </div>

            <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:8}}>Mode</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:20}}>
              {[['adjust','Adjustment'],['timeout','Draw Play']].map(([id,label]) => (
                <button key={id} onClick={() => setMode(id)}
                  style={{
                    background: mode===id ? 'var(--white)' : 'var(--black)',
                    color: mode===id ? 'var(--black)' : '#555',
                    border:`1px solid ${mode===id ? 'var(--white)' : 'var(--border)'}`,
                    padding:'8px 4px', cursor:'pointer', fontSize:9, letterSpacing:2,
                    fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
                    textTransform:'uppercase', transition:'all 0.1s'
                  }}>
                  {label}
                </button>
              ))}
            </div>

            {mode === 'timeout' && (
              <div style={{marginBottom:16}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8}}>
                  <div>
                    <label style={labelStyle}>Quarter</label>
                    <select style={{...inputStyle, cursor:'pointer'}} value={quarter} onChange={e=>setQuarter(e.target.value)}>
                      {[1,2,3,4,'OT'].map(q=><option key={q} value={q}>Q{q}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={labelStyle}>Time Left</label>
                    <input style={inputStyle} placeholder="2:30" value={timeRemaining} onChange={e=>setTimeRemaining(e.target.value)}/>
                  </div>
                </div>
                <label style={labelStyle}>Score Diff (+ = winning)</label>
                <input style={inputStyle} type="number" placeholder="-4" value={scoreDiff} onChange={e=>setScoreDiff(e.target.value)}/>
              </div>
            )}

            <label style={{...labelStyle, marginTop:8}}>Situation</label>
            <textarea
              style={{...inputStyle, height:90, resize:'none', fontWeight:400, textTransform:'none', fontSize:12, marginBottom:16}}
              placeholder={mode==='adjust'
                ? "Down 8 in the 3rd, their zone is killing our offense..."
                : "Need a quick 2, they're running man, our PG is hot..."}
              value={situation} onChange={e=>setSituation(e.target.value)}
            />

            <button onClick={run} disabled={loading || !myTeam}
              style={{
                width:'100%', padding:'14px', fontSize:11, letterSpacing:4,
                fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
                textTransform:'uppercase', cursor:'pointer', border:'none', transition:'all 0.1s',
                background: loading ? '#222' : 'var(--green)',
                color: loading ? '#444' : 'var(--black)'
              }}>
              {loading ? 'Thinking...' : mode==='adjust' ? 'Get Adjustments →' : 'Draw Play →'}
            </button>
          </div>
        )}

        {!selectedGame && (
          <div style={{padding:'32px 20px', fontSize:9, letterSpacing:3, color:'#333', lineHeight:2}}>
            Select a game to activate coach mode. Works best with live games. PIVOT reads the live box score and delivers real adjustments based on what's actually happening on the court.
          </div>
        )}
      </div>

      {/* CENTER — RESPONSE */}
      <div style={{borderRight:'1px solid var(--border)', overflowY:'auto'}}>
        {!result && !loading && !error && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'70vh', gap:16}}>
            <div style={{fontSize:'clamp(40px,6vw,80px)', letterSpacing:12, color:'var(--white)', lineHeight:1, textAlign:'center'}}>COACH<br/>MODE</div>
            <div style={{fontSize:9, letterSpacing:4, color:'#333', textAlign:'center', maxWidth:300, lineHeight:2}}>
              Select a game, pick your team, describe the situation, get real-time coaching adjustments from PIVOT
            </div>
          </div>
        )}

        {loading && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'70vh', gap:16}}>
            <div style={{fontSize:10, letterSpacing:5, color:'var(--green)'}}>PIVOT IS COACHING</div>
            <Loader label=""/>
          </div>
        )}

        {error && <div className="err" style={{margin:24}}>{error}</div>}

        {!loading && result && (
          <div style={{padding:'40px 48px'}}>
            <div style={{display:'flex', gap:12, alignItems:'center', marginBottom:28}}>
              <div style={{fontSize:9, letterSpacing:4, color:'var(--green)'}}>
                {result.mode === 'timeout' ? '⊙ PLAY DRAWN' : '⊙ ADJUSTMENTS READY'}
              </div>
              <div style={{fontSize:9, letterSpacing:2, color:'#333'}}>{result.my_team}</div>
            </div>
            <div style={{fontSize:15, lineHeight:2.2, letterSpacing:.5, color:'var(--white)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none'}}>
              {result.analysis || result.play}
            </div>
          </div>
        )}
      </div>

      {/* RIGHT — HISTORY + LIVE BOX */}
      <div style={{overflowY:'auto', background:'var(--grey)'}}>
        {selectedGame && boxScore && boxScore.total_players > 0 && (
          <div style={{borderBottom:'1px solid var(--border)'}}>
            <div style={{padding:'14px 20px', fontSize:8, letterSpacing:4, color:'#444', borderBottom:'1px solid var(--border)'}}>
              Live Box — {selectedGame.visitor_team.abbreviation} @ {selectedGame.home_team.abbreviation}
            </div>
            <div style={{padding:'0 16px 16px'}}>
              {['away_players','home_players'].map(key => {
                const team = key === 'home_players' ? boxScore.home_team : boxScore.away_team;
                const players = (boxScore[key]||[]).slice(0,6);
                return (
                  <div key={key} style={{marginTop:12}}>
                    <div style={{fontSize:8, letterSpacing:3, color:'var(--green)', marginBottom:6}}>{team?.abbreviation}</div>
                    {players.map((p,i) => (
                      <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid #141414', fontSize:10}}>
                        <span style={{letterSpacing:1, fontWeight:700, fontSize:11}}>{p.player.split(' ').pop()}</span>
                        <span style={{color:'var(--green)', letterSpacing:1}}>{p.pts}pt {p.reb}rb {p.ast}as</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{padding:'16px 20px'}}>
          <div style={{fontSize:8, letterSpacing:4, color:'#444', marginBottom:12}}>Call History</div>
          {history.length === 0 && <div style={{fontSize:9, letterSpacing:3, color:'#333'}}>No calls yet this session</div>}
          {history.map((h,i) => (
            <div key={i} style={{padding:'12px', marginBottom:6, border:'1px solid var(--border)', background:'var(--black)', cursor:'pointer'}}
              onClick={() => setResult(h)}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                <span style={{fontSize:8, letterSpacing:3, color:'var(--green)'}}>{h.mode?.toUpperCase()}</span>
                <span style={{fontSize:8, letterSpacing:2, color:'#333'}}>{h.timestamp}</span>
              </div>
              <div style={{fontSize:10, letterSpacing:1, color:'#888', fontWeight:400, textTransform:'none',
                overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis'}}>
                {h.situation || 'No situation provided'}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState('home');
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 10);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const isHome = tab === 'home';

  return (
    <>
      <nav className={scrolled || !isHome ? 'scrolled' : ''} style={!isHome ? {background:'var(--black)', borderBottom:'1px solid var(--border)'} : {}}>
        <div className="nav-tabs">
          {[['games','Games'],['players','Players'],['frontoffice','Front Office'],['coach','Coach Mode']].map(([id,label]) => (
            <button key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>
      </nav>

      <div style={{paddingTop: isHome ? 0 : 64, paddingBottom: 40}}>
        {tab==='home'        && <Home setTab={setTab}/>}
        {tab==='games'       && <Games/>}
        {tab==='players'     && <Players/>}
        {tab==='frontoffice' && <FrontOffice/>}
        {tab==='coach'       && <CoachMode/>}
      </div>

      <Ticker/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
